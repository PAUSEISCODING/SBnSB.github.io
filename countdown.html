<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta charset="UTF-8">
  <title>Countdown ❤️ Callum & Jamie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- NAV BAR -->
  <nav class="navbar">
    <div class="nav-title">❤️ Callum & Jamie</div>
    <button class="burger" id="burger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- FULLSCREEN MENU -->
  <div class="menu-overlay" id="menuOverlay">
    <ul class="menu-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="countdown.html">Countdown</a></li>
      <li><a href="memories.html">Memories</a></li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <main class="page">
    <div class="container">
      <h1>Until We See Each Other ❤️</h1>
      <div class="countdown" id="countdown">Loading…</div>
      <div class="labels">
        Days : Hours : Minutes : Seconds
      </div>
    </div>
  </main>

  <!-- COUNTDOWN SCRIPT -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      // ✅ Target date (UK time: 16:30 BST = 15:30 UTC)
      const targetDate = new Date("2026-05-01T15:30:00Z");
      const countdownEl = document.getElementById("countdown");

      function updateCountdown() {
        const now = Date.now();
        const difference = targetDate - now;

        if (difference <= 0) {
          countdownEl.textContent = "I'm Home :( ❤️";
          return;
        }

        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((difference / (1000 * 60)) % 60);
        const seconds = Math.floor((difference / 1000) % 60);

        countdownEl.textContent =
          `${days} : ${hours.toString().padStart(2, "0")} : ` +
          `${minutes.toString().padStart(2, "0")} : ` +
          `${seconds.toString().padStart(2, "0")}`;
      }

      setInterval(updateCountdown, 1000);
      updateCountdown();
    });
  </script>

  <!-- MENU SCRIPT -->
  <script src="nav.js"></script>

</body>
</html>
