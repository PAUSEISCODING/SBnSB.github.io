<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Memories ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAV BAR -->
  <nav class="navbar">
    <div class="nav-title">❤️ Callum & Jamie</div>

    <div class="burger" id="burger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="countdown.html">Countdown</a></li>
      <li><a href="memories.html">Memories</a></li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="page">
    <section class="memories-board">

      <div class="memories-header">
        <h1>Our Memories ❤️</h1>
        <p>Little moments that mean everything while we are apart.</p>
      </div>

      <!-- MEMORY STICKERS -->

      <div class="memory-sticker">
        <img src="assets/31124.jpeg" alt="Memory 1">
        <div class="sticker-text">
          <span class="date">3rd November 2024</span>
          <p>Our first video call 💕</p>
        </div>
      </div>

      <div class="memory-sticker">
        <img src="assets/060426.png" alt="Memory 2">
        <div class="sticker-text">
          <span class="date">6th April 2026</span>
          <p>Late night chats that turned into mornings</p>
        </div>
      </div>

      <div class="memory-sticker">
        <img src="assets/070426.jpg" alt="Memory 3">
        <div class="sticker-text">
          <span class="date">7th April 2026</span>
          <p>Counting down together 😃</p>
        </div>
      </div>

    </section>
  </main>

  <!-- BURGER SCRIPT -->
  <script>
    const burger = document.getElementById("burger");
    const navLinks = document.getElementById("navLinks");

    burger.addEventListener("click", () => {
      navLinks.classList.toggle("open");
      burger.classList.toggle("open");
    });
  </script>

</body>
</html>
